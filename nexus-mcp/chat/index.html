<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS — AI Legal Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #121217;
      --bg-panel: rgba(20, 20, 25, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #6366f1;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-gold: #f59e0b;
      --accent-purple: #a855f7;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --font: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); height: 100vh; overflow: hidden; }

    .app {
      display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 64px 1fr;
      height: 100vh;
      background: radial-gradient(ellipse at 20% 0%, rgba(99,102,241,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 100%, rgba(168,85,247,0.04) 0%, transparent 60%), var(--bg-primary);
    }

    /* === HEADER === */
    .header {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: rgba(10,10,12,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; }
    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: 1.5px; }
    .logo-badge { background: rgba(99,102,241,0.15); color: #818cf8; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .nav-btn { padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); color: var(--text-secondary); background: transparent; cursor: pointer; transition: all 0.2s; text-decoration: none; font-family: var(--font); }
    .nav-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: #fff; }
    .nav-btn.active { background: rgba(99,102,241,0.15); border-color: var(--accent); color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3f3f46; }
    .status-dot.online { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }

    /* === SIDEBAR === */
    .sidebar { grid-row: 2; background: var(--bg-panel); backdrop-filter: blur(12px); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 12px; }
    .user-profile { padding: 10px 14px; background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.15); border-radius: 10px; }
    .user-profile .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .user-profile .email { font-size: 11px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
    .session-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .session-list::-webkit-scrollbar { width: 3px; }
    .session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .session-card { padding: 14px 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .session-card:hover { background: rgba(99,102,241,0.08); border-color: rgba(99,102,241,0.2); }
    .session-topic { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .session-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
    .session-status { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .session-status.complete { background: rgba(16,185,129,0.2); color: #34d399; }
    .new-chat-btn { margin: 16px; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-purple)); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--font); }
    .new-chat-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }

    /* === MAIN CHAT === */
    .chat-main { grid-row: 2; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .messages-container { flex: 1; overflow-y: auto; padding: 24px 40px; display: flex; flex-direction: column; gap: 16px; }
    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    /* Welcome Screen */
    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 20px; padding: 40px; }
    .welcome-icon { width: 72px; height: 72px; background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1)); border: 1px solid rgba(99,102,241,0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .welcome h2 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .welcome p { color: var(--text-secondary); font-size: 14px; max-width: 460px; line-height: 1.6; }

    /* Message Bubbles */
    .msg { display: flex; gap: 12px; max-width: 720px; animation: msgIn 0.3s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.nexus { align-self: flex-start; }
    .msg-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .msg.user .msg-avatar { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); }
    .msg.nexus .msg-avatar { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); }
    .msg-content { display: flex; flex-direction: column; gap: 4px; }
    .msg-bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; word-break: break-word; }
    .msg.user .msg-bubble { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25); border-bottom-right-radius: 4px; }
    .msg.nexus .msg-bubble { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }
    .msg.user .msg-time { text-align: right; }

    /* Inline Buttons (like Telegram inline keyboard) */
    .msg-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .msg-btn { padding: 10px 16px; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.25); border-radius: 10px; color: #c7d2fe; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: left; font-family: var(--font); }
    .msg-btn:hover { background: rgba(99,102,241,0.2); border-color: var(--accent); color: #fff; transform: translateX(4px); }
    .msg-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .msg-btn-row { display: flex; gap: 8px; }
    .msg-btn-row .msg-btn { flex: 1; text-align: center; }

    /* Status chips */
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; }
    .chip.processing { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: #818cf8; }
    .chip.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #34d399; }
    .chip.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
    .chip.warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: #fbbf24; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: typingBounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* === INPUT BAR === */
    .input-bar { padding: 16px 40px 24px; background: linear-gradient(to top, rgba(10,10,12,0.95) 60%, transparent); }
    .progress-track { height: 3px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-purple)); box-shadow: 0 0 10px var(--accent); transition: width 1s ease; border-radius: 3px; }
    .input-wrapper { display: flex; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 6px 6px 6px 16px; transition: border-color 0.2s; }
    .input-wrapper:focus-within { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 3px rgba(99,102,241,0.08); }
    .input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; font-family: var(--font); outline: none; }
    .input-wrapper input::placeholder { color: var(--text-muted); }
    .file-btn, .send-btn { width: 40px; height: 40px; border-radius: 10px; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .file-btn { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .file-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .send-btn { background: linear-gradient(135deg, var(--accent), var(--accent-purple)); color: #fff; }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .input-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; }
    #fileInput { display: none; }

    /* Animations */
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .messages-container { padding: 16px; }
      .input-bar { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">◆</div>
        <span class="logo-text">NEXUS</span>
        <span class="logo-badge">AI LEGAL</span>
      </div>
      <div class="header-right">
        <a href="/dashboard" class="nav-btn">🏛️ 3D Courtroom</a>
        <a href="/chat" class="nav-btn active">💬 Chat</a>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Profile</div>
        <div class="user-profile" id="userProfileCard" style="display:none">
          <div class="name" id="profileName"></div>
          <div class="email" id="profileEmail"></div>
        </div>
      </div>
      <div class="sidebar-title" style="padding: 16px 24px 0;">Sessions</div>
      <div class="session-list" id="sessionList"></div>
      <button class="new-chat-btn" onclick="newChat()">+ New Investigation</button>
    </aside>

    <div class="chat-main">
      <div class="messages-container" id="messages">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">⚖️</div>
          <h2>NEXUS AI Legal Assistant</h2>
          <p>Your multi-agent AI legal investigation platform.<br/>50 agents. One verdict. Zero compromise.</p>
        </div>
      </div>
      <div class="input-bar">
        <div id="progressContainer" style="display:none">
          <div class="progress-track"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
        </div>
        <div class="input-wrapper">
          <input type="text" id="chatInput" placeholder="Type your legal query or question..." onkeydown="if(event.key==='Enter')onSend()" />
          <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" onchange="handleFileUpload(event)" />
          <button class="file-btn" onclick="document.getElementById('fileInput').click()" title="Upload document">📎</button>
          <button class="send-btn" id="sendBtn" onclick="onSend()" title="Send">➤</button>
        </div>
        <div class="input-hint">Supports PDF, DOCX, TXT documents • Same pipeline as WhatsApp & Telegram</div>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════
// NEXUS Chat Client — mirrors Telegram bot flow exactly
// ═══════════════════════════════════════════════════════════════════
const API = location.origin;
let ws = null;
let connected = false;

// --- State (mirrors Telegram bot state maps) ---
let userProfile = JSON.parse(localStorage.getItem('nexus_profile') || 'null'); // { name, email }
let registrationStep = null;  // null | 'AWAITING_NAME' | 'AWAITING_EMAIL'
let currentSessionId = null;
let isProcessing = false;
let pendingDocText = null;    // stored document text awaiting user's option choice
let agentsDone = 0;
let totalAgents = 0;

// ═══════════════════════════════════════════════════════════════════
// WebSocket — same events as dashboard receives
// ═══════════════════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { connected = true; document.getElementById('statusDot').className = 'status-dot online'; };
  ws.onclose = () => { connected = false; document.getElementById('statusDot').className = 'status-dot'; setTimeout(connectWS, 3000); };
  ws.onmessage = (e) => { try { handleWS(JSON.parse(e.data)); } catch {} };
}

function handleWS(d) {
  // Only process events for our current session (or broadcasts)
  if (d.sessionId && d.sessionId !== currentSessionId) return;

  switch (d.type) {
    case 'session_start':
      setProgress(10);
      break;

    case 'SHIELD_CHECK':
      // Show security shield progress
      if (d.check?.status === 'pass') {
        // silent
      } else if (d.check?.status === 'fail') {
        removeTyping();
        addNexus(`<span class="chip error">🛡️ Security Shield BLOCKED — ${esc(d.check.attackType || d.check.name)}</span>`);
        isProcessing = false;
        setProgress(0);
      }
      break;

    case 'SHIELD_CLEAR':
      setProgress(15);
      addNexus(`<span class="chip success">🛡️ Security Shield: ALL 7 CHECKS PASSED</span>`);
      break;

    case 'SHIELD_BLOCKED':
      removeTyping();
      addNexus(`<span class="chip error">🛡️ Security Shield BLOCKED — ${esc(d.attackType || 'UNKNOWN')}</span><br/><br/>Your input was flagged by our security system. Please rephrase your query.`);
      isProcessing = false;
      setProgress(0);
      break;

    case 'AGENT_ROSTER':
      totalAgents = d.totalAgents || 0;
      agentsDone = 0;
      setProgress(20);
      addNexus(`<span class="chip processing">🎯 ${totalAgents} agents routed for analysis</span>`);
      break;

    case 'AGENT_START':
      // Show which agent started (silent — too many)
      break;

    case 'AGENT_COMPLETE':
      agentsDone++;
      const pct = Math.min(20 + Math.round((agentsDone / Math.max(totalAgents, 1)) * 70), 90);
      setProgress(pct);
      // Show milestone agents
      if (d.agentId === 'prosecutor' || d.agentId === 'defense_counsel') {
        addNexus(`<span class="chip processing">⚔️ ${esc(d.name)}: "${esc((d.bubble || '').substring(0, 80))}"</span>`);
      }
      if (d.agentId === 'supreme_judge') {
        setProgress(95);
        addNexus(`<span class="chip processing">👨‍⚖️ Supreme Judge delivering verdict...</span>`);
      }
      break;

    case 'RISK_GATE':
      if (d.status === 'paused') {
        removeTyping();
        addNexusWithButtons(
          `<b>⚠️ Risk Gate Triggered</b><br/><br/>` +
          `🔴 Risk Score: <b>${Math.min(10, Math.round((d.risk_score || 0) > 10 ? d.risk_score / 10 : (d.risk_score || 0)))}/10</b><br/>` +
          `📝 This topic has legal sensitivity.<br/><br/>` +
          `<i>Pipeline paused for your approval.</i>`,
          [
            { label: '✅ Continue', action: () => respondRiskGate(true) },
            { label: '🛑 Cancel', action: () => respondRiskGate(false) }
          ],
          'row'
        );
      }
      if (d.status === 'approved') {
        addNexus(`<span class="chip success">✅ Risk Gate Approved — pipeline resumed</span>`);
        addTyping();
      }
      if (d.status === 'cancelled') {
        addNexus(`<span class="chip error">🛑 Investigation cancelled by user</span>`);
        isProcessing = false;
        setProgress(0);
      }
      break;

    case 'session_complete':
      removeTyping();
      setProgress(100);
      isProcessing = false;
      agentsDone = 0;

      const v = esc(d.verdict || '').replace(/\n/g, '<br/>').replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
      const driveHtml = d.driveLink ? `<br/><br/><a href="${d.driveLink}" target="_blank" style="color:#818cf8;">☁️ View Report on Cloud</a>` : '';

      addNexus(
        `<b>⚖️ Final Verdict — NEXUS Tribunal</b><br/><br/>` +
        `${v.substring(0, 4000)}` +
        `<br/><br/><span class="chip success">Confidence: ${d.confidence || '?'}% • Risk: ${(d.risk_level || 'N/A').toUpperCase()}</span>` +
        driveHtml
      );
      setTimeout(() => setProgress(0), 3000);
      loadSessions();
      break;

    case 'session_error':
      removeTyping();
      addNexus(`<span class="chip error">❌ ${esc(d.error || 'Pipeline error')}</span>`);
      isProcessing = false;
      setProgress(0);
      break;
  }
}

function respondRiskGate(approved) {
  fetch(`${API}/api/pipeline/risk-response`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: currentSessionId, approved })
  });
  disableAllButtons();
  addUser(approved ? '✅ Continue' : '🛑 Cancel');
  if (approved) addTyping();
}

// ═══════════════════════════════════════════════════════════════════
// Messages
// ═══════════════════════════════════════════════════════════════════
function hideWelcome() {
  const w = document.getElementById('welcomeScreen');
  if (w) w.style.display = 'none';
}

function addUser(html) {
  hideWelcome();
  appendMsg('user', html);
}

function addNexus(html) {
  hideWelcome();
  appendMsg('nexus', html);
}

function addNexusWithButtons(html, buttons, layout) {
  hideWelcome();
  const container = document.getElementById('messages');
  const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const id = 'btns_' + Date.now();

  const btnClass = layout === 'row' ? 'msg-btn-row' : 'msg-buttons';
  const btnsHtml = `<div class="${btnClass}" id="${id}">${buttons.map((b, i) =>
    `<button class="msg-btn" data-idx="${i}">${b.label}</button>`
  ).join('')}</div>`;

  const div = document.createElement('div');
  div.className = 'msg nexus';
  div.innerHTML = `<div class="msg-avatar">⚖️</div><div class="msg-content"><div class="msg-bubble">${html}${btnsHtml}</div><div class="msg-time">${time}</div></div>`;
  container.appendChild(div);
  scrollBottom();

  // Attach handlers
  const btnEls = div.querySelectorAll('.msg-btn');
  btnEls.forEach((el, i) => {
    el.onclick = () => {
      buttons[i].action();
      btnEls.forEach(b => b.disabled = true);
    };
  });
}

function appendMsg(sender, html) {
  const container = document.getElementById('messages');
  const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const avatar = sender === 'user' ? '👤' : '⚖️';
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-content"><div class="msg-bubble">${html}</div><div class="msg-time">${time}</div></div>`;
  container.appendChild(div);
  scrollBottom();
}

function addTyping() {
  removeTyping();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg nexus'; div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">⚖️</div><div class="msg-content"><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  container.appendChild(div);
  scrollBottom();
}

function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }
function scrollBottom() { const c = document.getElementById('messages'); c.scrollTop = c.scrollHeight; }
function disableAllButtons() { document.querySelectorAll('.msg-btn').forEach(b => b.disabled = true); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function setProgress(pct) {
  const c = document.getElementById('progressContainer');
  const b = document.getElementById('progressBar');
  if (pct > 0) { c.style.display = 'block'; b.style.width = pct + '%'; }
  else { c.style.display = 'none'; b.style.width = '0%'; }
}

// ═══════════════════════════════════════════════════════════════════
// Input Handler — mirrors Telegram's message handler exactly
// ═══════════════════════════════════════════════════════════════════
function onSend() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // --- 1. Registration Flow (same as Telegram) ---
  if (registrationStep === 'AWAITING_NAME') {
    userProfile = { name: text, email: '' };
    registrationStep = 'AWAITING_EMAIL';
    addUser(esc(text));
    addNexus(`📧 Nice to meet you, <b>${esc(text)}</b>. One last step!<br/><br/>Please enter your <b>Email Address</b> so we can securely deliver the final PDF Report to you:`);
    return;
  }

  if (registrationStep === 'AWAITING_EMAIL') {
    userProfile.email = text;
    registrationStep = null;
    localStorage.setItem('nexus_profile', JSON.stringify(userProfile));
    showProfileCard();
    addUser(esc(text));
    addNexus(`✅ <b>Registration Complete</b><br/><br/>Thank you! Your details will be attached to all generated legal records.<br/><br/><b>What is your query?</b><br/>You can type text, attach a document, or select an option below.`);
    showMainMenu();
    return;
  }

  // --- 2. Must be registered ---
  if (!userProfile) {
    startRegistration();
    return;
  }

  // --- 3. Document clarification response (user typed custom question) ---
  if (pendingDocText) {
    const docText = pendingDocText;
    pendingDocText = null;
    disableAllButtons();
    addUser(esc(text));
    startPipeline(`[Document Review - Custom Question] User's specific question: "${text}"\n\nDocument content:\n${docText}`);
    return;
  }

  // --- 4. Active investigation check ---
  if (isProcessing) {
    addNexus(`<span class="chip warning">⏳ An investigation is already running. Please wait for it to complete.</span>`);
    return;
  }

  // --- 5. Short message check ---
  if (text.length < 3) {
    addNexus(`Please provide a valid query. <b>What is your query?</b><br/>You can type text, attach a document, or select a solution above.`);
    return;
  }

  // --- 6. General Investigation (same as Telegram: raw text → pipeline) ---
  addUser(esc(text));
  startPipeline(`[General Investigation] ${text}`);
}

// ═══════════════════════════════════════════════════════════════════
// Registration (mirrors Telegram's AWAITING_NAME → AWAITING_EMAIL)
// ═══════════════════════════════════════════════════════════════════
function startRegistration() {
  registrationStep = 'AWAITING_NAME';
  addNexus(`🔮 <b>Welcome to NEXUS</b><br/><br/>To ensure proper records for our Legal Database, please tell me your <b>Full Name</b>:`);
}

function showProfileCard() {
  if (!userProfile) return;
  document.getElementById('userProfileCard').style.display = 'block';
  document.getElementById('profileName').textContent = userProfile.name;
  document.getElementById('profileEmail').textContent = userProfile.email;
}

// ═══════════════════════════════════════════════════════════════════
// Main Menu (mirrors Telegram's inline keyboard)
// ═══════════════════════════════════════════════════════════════════
function showMainMenu() {
  addNexusWithButtons(
    `🔮 <b>NEXUS AI Legal Investigation</b><br/><br/>Select a solution to begin:`,
    [
      { label: '🔍 General Investigation', action: () => selectSolution('General Investigation') },
      { label: '📄 Document Review', action: () => selectSolution('Document Review') },
      { label: '⚖️ Risk Assessment', action: () => selectSolution('Risk Assessment') }
    ]
  );
}

function selectSolution(solution) {
  disableAllButtons();
  addUser(solution);

  if (solution === 'Document Review') {
    addNexus(`✅ You selected <b>Document Review</b>.<br/><br/>Please upload a PDF, DOCX, or TXT file using the 📎 button below:`);
  } else {
    addNexus(`✅ You selected <b>${esc(solution)}</b>.<br/><br/>Please type your query or attach a relevant document below to begin:`);
  }
}

// ═══════════════════════════════════════════════════════════════════
// Document Upload (mirrors Telegram's document handler exactly)
// ═══════════════════════════════════════════════════════════════════
async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  if (!userProfile) { startRegistration(); return; }

  if (isProcessing) {
    addNexus(`<span class="chip warning">⏳ An investigation is already running. Please wait.</span>`);
    return;
  }

  const fileName = file.name;
  const fileSize = file.size;

  if (fileSize > 10 * 1024 * 1024) {
    addNexus(`<span class="chip error">❌ File too large. Maximum size is 10MB.</span>`);
    return;
  }

  addUser(`📎 Uploaded: <b>${esc(fileName)}</b> (${(fileSize / 1024).toFixed(1)} KB)`);
  addNexus(`📎 <b>Document Received</b><br/><br/>📄 File: <code>${esc(fileName)}</code><br/>📏 Size: ${(fileSize / 1024).toFixed(1)} KB<br/><br/>Extracting and analyzing document...`);
  addTyping();

  try {
    // Step 1: Parse document on server (same as Telegram's extractTextFromFile)
    let extractedText = '';
    const ext = fileName.toLowerCase().split('.').pop();

    if (ext === 'txt' || ext === 'md') {
      extractedText = await file.text();
    } else if (ext === 'pdf' || ext === 'docx') {
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch(`${API}/api/chat/parse-document`, { method: 'POST', body: formData });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (!data.text || data.text.length < 10) throw new Error('Could not extract enough text from document');
      extractedText = data.text;
    } else {
      throw new Error('Unsupported file type. Please upload PDF, DOCX, or TXT.');
    }

    // Step 2: Analyze document type + summary (same as Telegram)
    const analyzeRes = await fetch(`${API}/api/chat/analyze-document`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: extractedText.substring(0, 4000) })
    });
    const analysis = await analyzeRes.json();

    removeTyping();

    // Step 3: Store text and show options (same 4 buttons as Telegram)
    pendingDocText = extractedText.substring(0, 4000);

    addNexusWithButtons(
      `📄 <b>Document Analyzed</b><br/><br/>` +
      `📋 <b>Type:</b> ${esc(analysis.documentType || 'Document')}<br/>` +
      `📝 <b>Summary:</b> ${esc(analysis.summary || 'Document uploaded for analysis')}<br/><br/>` +
      `<i>Extracted ${extractedText.length.toLocaleString()} characters from <code>${esc(fileName)}</code></i><br/><br/>` +
      `How would you like me to help you with this document?<br/><br/><i>Or type your specific question below:</i>`,
      [
        { label: '📋 Full Analysis', action: () => handleDocOption('📋 Full Analysis', 'Perform a complete deep legal analysis of this document — examine all clauses, risks, obligations, and legal implications.') },
        { label: '💡 Brief Explanation', action: () => handleDocOption('💡 Brief Explanation', 'Explain this document in simple, human-understandable language — what it means, what the user should know, and key takeaways.') },
        { label: '📚 Key References', action: () => handleDocOption('📚 Key References', 'List all relevant laws, acts, sections, court precedents, and references the user needs to know about based on this document.') },
        { label: '✏️ Type My Own Question', action: () => {
          disableAllButtons();
          addNexus(`✏️ Please type your specific question about the document below:`);
          document.getElementById('chatInput').focus();
        }}
      ]
    );
  } catch (err) {
    removeTyping();
    addNexus(`<span class="chip error">❌ Failed to process document: ${esc(err.message)}</span>`);
  }
}

function handleDocOption(label, description) {
  if (!pendingDocText) return;
  const docText = pendingDocText;
  pendingDocText = null;
  disableAllButtons();
  addUser(esc(label));
  startPipeline(`[Document Review - ${label}] ${description}\n\nDocument content:\n${docText}`);
}

// ═══════════════════════════════════════════════════════════════════
// Pipeline Start (mirrors Telegram's startInvestigation function)
// ═══════════════════════════════════════════════════════════════════
async function startPipeline(input) {
  isProcessing = true;
  agentsDone = 0;
  totalAgents = 0;
  addTyping();
  setProgress(5);

  try {
    const res = await fetch(`${API}/api/pipeline/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: input,
        username: userProfile ? `${userProfile.name} (${userProfile.email})` : 'WebUser',
        user_email: userProfile?.email || ''
      })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    currentSessionId = data.session_id;

    removeTyping();
    addNexus(
      `🚀 <b>Investigation Started</b><br/><br/>` +
      `🆔 Session: <code>${data.session_id.substring(0, 8)}</code><br/><br/>` +
      `🔍 Research + Legal agents running in parallel...<br/><br/>` +
      `📊 <a href="/dashboard?session=${data.session_id}" target="_blank" style="color:#818cf8;">Watch live on 3D Dashboard</a>`
    );
    addTyping();
  } catch (err) {
    removeTyping();
    addNexus(`<span class="chip error">❌ Connection error: ${esc(err.message)}</span>`);
    isProcessing = false;
    setProgress(0);
  }
}

// ═══════════════════════════════════════════════════════════════════
// Session Management
// ═══════════════════════════════════════════════════════════════════
function newChat() {
  isProcessing = false;
  pendingDocText = null;
  currentSessionId = null;
  registrationStep = null;
  agentsDone = 0;
  totalAgents = 0;
  setProgress(0);

  const container = document.getElementById('messages');
  container.innerHTML = `<div class="welcome" id="welcomeScreen"><div class="welcome-icon">⚖️</div><h2>NEXUS AI Legal Assistant</h2><p>Your multi-agent AI legal investigation platform.<br/>50 agents. One verdict. Zero compromise.</p></div>`;

  if (userProfile) {
    showMainMenu();
  } else {
    startRegistration();
  }
}

async function loadSessions() {
  try {
    const res = await fetch(`${API}/api/sessions`);
    const sessions = await res.json();
    const list = document.getElementById('sessionList');
    list.innerHTML = sessions.slice(0, 20).map(s => `
      <div class="session-card">
        <div class="session-topic">${esc((s.topic || 'Investigation').substring(0, 80))}</div>
        <div class="session-meta">
          <span>${new Date(s.created_at).toLocaleDateString()}</span>
          <span class="session-status ${s.status || 'complete'}">${(s.status || 'complete').toUpperCase()}</span>
        </div>
      </div>
    `).join('');
  } catch {}
}

// ═══════════════════════════════════════════════════════════════════
// Init — check if user is already registered
// ═══════════════════════════════════════════════════════════════════
connectWS();
loadSessions();

if (userProfile) {
  showProfileCard();
  showMainMenu();
} else {
  startRegistration();
}
</script>
